<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>TAX GRAB — $SHERIFF</title>
<meta name="description" content="Play the Sheriff. Grab every falling coin, sack and bill — dodge Robin Hood's arrows. He keeps ALL the taxes." />
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
:root{--lime:#ccff00;--gold:#f5c542;--ink:#0c0e05;--bg:#0d0f07;--white:#f6f7f1;--muted:#a7ad97}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--white)}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
.ui{position:absolute;inset:0;pointer-events:none}
.top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px;font-family:'Bebas Neue';letter-spacing:1px}
.score{font-size:2.4rem;line-height:1;color:var(--gold);text-shadow:0 2px 8px rgba(0,0,0,.6)}
.score small{display:block;font-family:'Plus Jakarta Sans';font-weight:700;font-size:.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.right{text-align:right}
.combo{font-size:1.6rem;color:var(--lime);opacity:0;transition:opacity .2s;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.combo.on{opacity:1}
.lives{font-size:1.4rem;margin-top:2px;letter-spacing:2px}
.back{position:absolute;top:16px;left:50%;transform:translateX(-50%);pointer-events:auto;font-family:'Plus Jakarta Sans';font-weight:700;font-size:.8rem;color:var(--muted);text-decoration:none;background:rgba(0,0,0,.35);padding:.4em .9em;border-radius:999px;border:1px solid rgba(255,255,255,.12)}
.bubble{position:absolute;max-width:230px;background:var(--white);color:var(--ink);font-weight:700;font-size:.92rem;padding:.6em .9em;border-radius:14px;opacity:0;transform:translateY(6px) scale(.96);transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.bubble.on{opacity:1;transform:none}
.bubble::after{content:"";position:absolute;bottom:-8px;left:28px;border:8px solid transparent;border-top-color:var(--white);border-bottom:0}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;pointer-events:auto;background:radial-gradient(circle at 50% 40%,rgba(13,15,7,.72),rgba(13,15,7,.94))}
.overlay.hidden{display:none}
.overlay h1{font-family:'Bebas Neue';font-size:clamp(3rem,13vw,5.5rem);line-height:.9;letter-spacing:2px}
.overlay h1 .g{color:var(--gold)}.overlay h1 .l{color:var(--lime)}
.overlay p{color:var(--muted);max-width:34ch;margin:.7rem 0 1.4rem;font-size:1.02rem;line-height:1.5}
.overlay .big{font-family:'Bebas Neue';font-size:2rem;color:var(--gold);margin:.2rem 0}
.overlay .big small{font-family:'Plus Jakarta Sans';font-weight:700;font-size:.7rem;letter-spacing:2px;color:var(--muted);display:block;text-transform:uppercase}
.btn{pointer-events:auto;background:var(--lime);color:var(--ink);font-family:'Plus Jakarta Sans';font-weight:800;font-size:1.15rem;padding:.85em 2em;border:none;border-radius:999px;cursor:pointer;box-shadow:0 10px 30px rgba(204,255,0,.3);transition:transform .12s}
.btn:active{transform:scale(.96)}
.hint{margin-top:1.1rem;font-size:.82rem;color:var(--muted)}
.mute{position:absolute;bottom:14px;right:16px;pointer-events:auto;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);color:var(--white);width:42px;height:42px;border-radius:50%;font-size:1.1rem;cursor:pointer}
.sheriffPeek{width:min(240px,52vw);margin-bottom:.6rem;filter:drop-shadow(0 12px 30px rgba(0,0,0,.6))}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>

<div class="ui">
  <div class="top">
    <div class="score" id="scoreBox">0<small>Taxes</small></div>
    <a class="back" href="../index.html">← Home</a>
    <div class="right">
      <div class="combo" id="comboBox">x2</div>
      <div class="lives" id="livesBox">🪙🪙🪙</div>
    </div>
  </div>
  <div class="bubble" id="bubble"></div>
  <button class="mute" id="muteBtn">🔊</button>
</div>

<!-- START -->
<div class="overlay" id="startScreen">
  <img class="sheriffPeek" id="peek" alt="" src="sprites/face-scheme.png" />
  <h1><span class="g">TAX</span> <span class="l">GRAB</span></h1>
  <p>You're the Sheriff. Catch every falling coin, sack &amp; bill — and <b>dodge Robin Hood's arrows</b>. Keep it <i>all</i>.</p>
  <button class="btn" id="startBtn">▶ Start Collecting</button>
  <div class="hint">Drag / move mouse to slide · ← → or A/D on keyboard</div>
</div>

<!-- GAME OVER -->
<div class="overlay hidden" id="overScreen">
  <img class="sheriffPeek" id="overFace" alt="" src="sprites/face-nervous.png" />
  <h1><span class="g">TAX</span> <span class="l">AUDIT</span></h1>
  <div class="big" id="finalScore">0<small>You collected</small></div>
  <div class="big" id="bestScore">0<small>Best haul</small></div>
  <p id="overQuote">"Every road leads to my taxes."</p>
  <button class="btn" id="againBtn">↻ Collect Again</button>
  <div class="hint"><a href="../index.html" style="color:var(--muted)">← Back to $SHERIFF</a></div>
</div>

<script src="game.js"></script>
</body>
</html>
