# Coin contract auto-verifier — runs 24/7 next to the indexer and verifies every new coin's
# token / curve / bond on Blockscout automatically.
#
#   From the launchpad repo root, after a deploy (deploy.json is committed + baked into the image):
#     docker compose -f docker-compose.verifier.yml up -d --build
#
# FACTORY + START_BLOCK are read automatically from the baked-in deploy.json — you don't need to set
# anything. (Override via a .env in this dir only if you must.) It never touches user funds and needs
# no private key — read-only chain access + Blockscout's public verify API. Restarts on reboot; scan
# progress persists in the named volume. Rebuild (--build) after a redeploy.
services:
  verifier:
    build:
      context: .
      dockerfile: docker/verifier.Dockerfile
    image: robinlabs-verifier
    container_name: robinlabs-verifier
    restart: unless-stopped
    environment:
      # Left blank on purpose → auto-verify falls back to the baked-in deploy.json (factory + block).
      # Only set these to override. NOTE: a literal "0" here would force a scan from block 0 (very slow),
      # so leave START_BLOCK blank unless you truly mean a specific block.
      FACTORY: "${FACTORY:-}"
      START_BLOCK: "${START_BLOCK:-}"
      RPC_URL: "${RPC_URL:-https://robinhoodchain.blockscout.com/api/eth-rpc}"
      BLOCKSCOUT_URL: "${BLOCKSCOUT_URL:-https://robinhoodchain.blockscout.com}"
      POLL_MS: "${POLL_MS:-15000}"
    volumes:
      - verifier-data:/data
volumes:
  verifier-data:
