# Coin contract auto-verifier — runs 24/7 next to the indexer and verifies every new coin's
# token / curve / bond on Blockscout automatically.
#
#   1) deploy the stack (writes deploy.json) and compile, THEN from the launchpad repo root:
#   2) set FACTORY + START_BLOCK below (from the deploy output / deploy.json), or leave them blank
#      to let the container read a mounted deploy.json.
#   3) docker compose -f docker-compose.verifier.yml up -d --build
#
# It never touches user funds and needs no private key — read-only chain access + Blockscout's
# public verify API. Restarts on reboot; scan progress persists in the named volume.
services:
  verifier:
    build:
      context: .
      dockerfile: docker/verifier.Dockerfile
    image: robinlabs-verifier
    restart: unless-stopped
    environment:
      # The factory that emits Launched, and the block it was deployed at (skip ancient history).
      # Leave blank to read them from a mounted deploy.json (see the volume below).
      FACTORY: "${FACTORY:-}"
      START_BLOCK: "${START_BLOCK:-0}"
      RPC_URL: "${RPC_URL:-https://robinhoodchain.blockscout.com/api/eth-rpc}"
      BLOCKSCOUT_URL: "${BLOCKSCOUT_URL:-https://robinhoodchain.blockscout.com}"
      POLL_MS: "${POLL_MS:-15000}"
    volumes:
      - verifier-data:/data
      # Optional: mount the deploy manifest so FACTORY/START_BLOCK are read automatically.
      # - ./deploy.json:/app/deploy.json:ro
volumes:
  verifier-data:
